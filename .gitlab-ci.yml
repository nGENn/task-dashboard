stages:
  - lint
  - test

variables:
  POSTGRES_USER: 'ticket_dashboard'
  POSTGRES_PASSWORD: ''
  POSTGRES_DB: 'test_ticket_dashboard'
  POSTGRES_HOST_AUTH_METHOD: trust

precommit:
  stage: lint
  image: ghcr.io/astral-sh/uv:python3.13-bookworm
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  cache:
    paths:
      - ${PRE_COMMIT_HOME}
  script:
    - uvx --with pre-commit-uv pre-commit run --show-diff-on-failure --color=always --all-files

pytest:
  stage: test
  image: docker:25.0
  variables:
    ENV_DJANGO_FILE: .envs/.ci/.django
    ENV_POSTGRES_FILE: .envs/.ci/.postgres
  services:
    - docker:dind
  before_script:
    - docker compose -f docker-compose.test.yml build
    - docker compose -f docker-compose.test.yml up -d postgres
    # Ensure celerybeat does not crash due to non-existent tables
    - docker compose -f docker-compose.test.yml run --rm -e DJANGO_SETTINGS_MODULE=config.settings.test django python manage.py migrate
  script:
    - docker compose -f docker-compose.test.yml run --rm django pytest
