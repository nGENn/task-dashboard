stages:
  - lint
  - test
  - build

variables:
  # CI/CD Database Settings
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: test_ticket_dashboard
  POSTGRES_USER: ticket_dashboard
  POSTGRES_PASSWORD: 'ci_secure_password'
  POSTGRES_HOST_AUTH_METHOD: trust

  # Docker Settings
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  IMAGE: $CI_REGISTRY_IMAGE

  # Django Settings for Testing
  DJANGO_SETTINGS_MODULE: config.settings.test
  SECRET_KEY: "ci_secret_key_for_testing"
  ALLOWED_HOSTS: "localhost,127.0.0.1"
  USE_DOCKER: "yes"

# --- Lint Stage (Unchanged) ---
precommit:
  stage: lint
  image: ghcr.io/astral-sh/uv:python3.14-trixie-slim
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  cache:
    paths:
      - ${PRE_COMMIT_HOME}
  script:
    - apt-get update && apt-get install -y git
    - uvx --with pre-commit-uv pre-commit run --show-diff-on-failure --color=always --all-files

# --- Test Stage (Refactored) ---
pytest:
  stage: test
  image: docker:25.0
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - |
      if [ "$GCL" = "true" ]; then
        echo "Detected gitlab-ci-local, falling back to host Docker socket"
        export DOCKER_HOST=unix:///var/run/docker.sock
      fi
    # 1. Create a temporary .env file for the root docker-compose.yml
    #    (Compose will fail if 'env_file: .env' is missing)
    - echo "POSTGRES_DB=$POSTGRES_DB" >> .env
    - echo "POSTGRES_USER=$POSTGRES_USER" >> .env
    - echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> .env
    - echo "POSTGRES_HOST=$POSTGRES_HOST" >> .env
    - echo "DJANGO_SETTINGS_MODULE=$DJANGO_SETTINGS_MODULE" >> .env
    - echo "SECRET_KEY=$SECRET_KEY" >> .env

    # 2. Build and Start Postgres using the ROOT Compose file
    - docker compose build django
    - docker compose up -d postgres

    # 3. Wait for DB (Entrypoint handles this, but we need to wait before migrating)
    - sleep 5

    # 4. Run Migrations
    - docker compose run --rm django python manage.py migrate

  script:
    - docker compose run --rm django pytest

check_version_bump:
  stage: test
  image: debian:latest
  only:
    - merge_requests
  script:
    - |
      apt update && apt install git curl -y
      curl -LsSf https://astral.sh/uv/install.sh | sh
      export PATH="/root/.local/bin:$PATH"

      # Get version from PR branch
      PR_VERSION=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)

      # Get version from Main branch
      git fetch origin main
      git checkout origin/main -- pyproject.toml
      MAIN_VERSION=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)

      echo "PR version: $PR_VERSION"
      echo "Main version: $MAIN_VERSION"

      if [ "$(printf '%s\n' "$MAIN_VERSION" "$PR_VERSION" | sort -V | head -n1)" != "$MAIN_VERSION" ] || [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
        echo "❌ Version must be bumped and higher than main!"
        exit 1
      fi
  allow_failure: false

# --- Build Stage (Refactored) ---
build-image:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  script:
    - |
      echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY

      # Version Extraction
      apk add curl
      curl -LsSf https://astral.sh/uv/install.sh | sh
      export PATH="/root/.local/bin:$PATH"
      VERSION=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)
      echo "Detected version: $VERSION"

      # Buildx Setup
      docker buildx create --use --name builder
      docker buildx inspect --bootstrap

      # Build and Push
      # Note: Explicitly pointing to docker/django/Dockerfile while keeping context as '.'
      docker buildx build \
          --tag $IMAGE:latest \
          --tag $IMAGE:$VERSION \
          --push \
          --file ./docker/django/Dockerfile \
          .

  allow_failure: false
  only:
    - main
