stages:
  - lint
  - test
  - build

image: ghcr.io/astral-sh/uv:python3.13-bookworm

variables:
  # Aligned with ARCHITECTURE.md: PostgreSQL 18
  POSTGRES_USER: 'task_dashboard'
  POSTGRES_PASSWORD: ''
  POSTGRES_DB: 'test_task_dashboard'
  POSTGRES_HOST_AUTH_METHOD: trust
  # Aligned with ARCHITECTURE.md: Valkey/Redis parity
  VALKEY_URL: "redis://valkey:6379/0"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "" 
  IMAGE: $CI_REGISTRY_IMAGE
  UV_CACHE_DIR: .uv-cache

cache:
  key:
    files:
      - uv.lock
  paths:
    - .uv-cache

# ---------------------------------------------------------------------------
# LINT STAGE: Tailwind v4 discovery engine scans these files
# ---------------------------------------------------------------------------
precommit:
  stage: lint
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
    SKIP: pytest
  cache:
    paths:
      - ${PRE_COMMIT_HOME}
  script:
    - uvx --with pre-commit-uv pre-commit run --show-diff-on-failure --color=always --all-files

# ---------------------------------------------------------------------------
# TEST STAGE: Verifying GIN indexes and Identity Bridge
# ---------------------------------------------------------------------------
pytest:
  stage: test
  services:
    - name: postgres:18-alpine
      alias: postgres
    - name: valkey/valkey:8
      alias: valkey
  variables:
    DATABASE_URL: "postgres://task_dashboard@postgres:5432/test_task_dashboard"
    DJANGO_SECRET_KEY: "test-key"
    DJANGO_SETTINGS_MODULE: "config.settings.test"
  script:
    - uv sync --frozen
    - uv run pytest

check_version_bump:
  stage: test
  only:
    - merge_requests
  script:
    - PR_VERSION=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)
    - git fetch origin main
    - git checkout origin/main -- pyproject.toml
    - MAIN_VERSION=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)
    - 'echo "PR version: $PR_VERSION | Main version: $MAIN_VERSION"'
    - |
      if [ "$(printf '%s\n' "$MAIN_VERSION" "$PR_VERSION" | sort -V | head -n1)" != "$MAIN_VERSION" ] || [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
        echo "❌ Version must be bumped in pyproject.toml!"
        exit 1
      fi
  allow_failure: false

# ---------------------------------------------------------------------------
# BUILD STAGE: Multi-container stack preparation
# ---------------------------------------------------------------------------
build-image:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      alias: docker
  variables:
    # Explicitly link Docker client to the DinD service
    DOCKER_HOST: tcp://docker:2375
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY

    # Install uv/uvx correctly for Alpine
    - apk add curl
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - source $HOME/.cargo/env
    
    # Extract version using uvx (now available in path)
    - VERSION=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)
    - 'echo "Building version: $VERSION"'

    - docker buildx create --use --name builder
    
    # Tailwind v4 logic: Dockerfile must copy source before building CSS
    - docker buildx build
      --tag $IMAGE:latest
      --tag $IMAGE:$VERSION
      --push
      --cache-from type=registry,ref=$IMAGE:buildcache
      --cache-to type=registry,ref=$IMAGE:buildcache,mode=max
      -f ./compose/production/django/Dockerfile .
  only:
    - main