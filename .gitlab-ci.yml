stages:
  - lint
  - test
  - build

variables:
  POSTGRES_USER: 'ticket_dashboard'
  POSTGRES_PASSWORD: ''
  POSTGRES_DB: 'test_ticket_dashboard'
  POSTGRES_HOST_AUTH_METHOD: trust
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""    # Needed for docker:dind + buildx
  IMAGE: $CI_REGISTRY_IMAGE

precommit:
  stage: lint
  image: ghcr.io/astral-sh/uv:python3.13-bookworm
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  cache:
    paths:
      - ${PRE_COMMIT_HOME}
  script:
    - uvx --with pre-commit-uv pre-commit run --show-diff-on-failure --color=always --all-files

pytest:
  stage: test
  image: docker:25.0
  services:
    - docker:dind
  before_script:
    - ls -lah
    - docker compose -f docker-compose.local.yml build
    # Ensure celerybeat does not crash due to non-existent tables
    - docker compose -f docker-compose.local.yml run --rm django ls -lah
    - docker compose -f docker-compose.local.yml run --rm django uv run manage.py migrate
    - docker compose -f docker-compose.local.yml up -d
  script:
    - docker compose -f docker-compose.local.yml run django uv run pytest


check_version_bump:
  stage: test
  image: debian:latest
  only:
    - merge_requests
  script:
    - apt update
    - apt install git curl -y
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - PR_VERSION=$(/root/.local/bin/uvx --from toml-cli toml get --toml-path pyproject.toml project.version)
    - git fetch origin main
    - git checkout origin/main -- pyproject.toml
    - MAIN_VERSION=$(/root/.local/bin/uvx --from toml-cli toml get --toml-path pyproject.toml project.version)

    - 'echo "PR version: $PR_VERSION"'
    - 'echo "Main version: $MAIN_VERSION"'

    - |
      # Compare versions
      if [ "$(printf '%s\n' "$MAIN_VERSION" "$PR_VERSION" | sort -V | head -n1)" != "$MAIN_VERSION" ] || [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
        echo "❌ Version must be bumped and higher than main!"
        exit 1
      fi

  allow_failure: false


build-image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    # ----------------------------
    # Login to GitLab container registry
    # ----------------------------
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY

    # ----------------------------
    # Extract version from pyproject.toml
    #   Uses pure grep (no extra tools)
    # ----------------------------
    - apk add curl
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - VERSION=$(/root/.local/bin/uvx --from toml-cli toml get --toml-path pyproject.toml project.version)
    - 'echo "Detected version: $VESION"'

    # ----------------------------
    # Enable buildx
    # ----------------------------
    - docker buildx create --use --name builder
    - docker buildx inspect --bootstrap
    - 'echo "building image: $IMAGE"'

    # ----------------------------
    # Build and push with registry cache
    # ----------------------------
    - docker buildx build --tag $IMAGE:latest --tag $IMAGE:$VERSION --push -f ./compose/production/django/Dockerfile .

  allow_failure: false

  only:
    - main
