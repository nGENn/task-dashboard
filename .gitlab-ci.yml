stages:
  - lint
  - test
  - build

variables:
  POSTGRES_USER: 'ticket_dashboard'
  POSTGRES_PASSWORD: ''
  POSTGRES_DB: 'test_ticket_dashboard'
  POSTGRES_HOST_AUTH_METHOD: trust
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""    # Needed for docker:dind + buildx
  IMAGE: $CI_REGISTRY_IMAGE

precommit:
  stage: lint
  image: ghcr.io/astral-sh/uv:python3.13-bookworm
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  cache:
    paths:
      - ${PRE_COMMIT_HOME}
  script:
    - uvx --with pre-commit-uv pre-commit run --show-diff-on-failure --color=always --all-files

pytest:
  stage: test
  image: docker:25.0
  variables:
    ENV_DJANGO_FILE: .envs/.ci/.django
    ENV_POSTGRES_FILE: .envs/.ci/.postgres
  services:
    - docker:dind
  before_script:
    - docker compose -f docker-compose.test.yml build
    - docker compose -f docker-compose.test.yml up -d postgres
    # Ensure celerybeat does not crash due to non-existent tables
    - docker compose -f docker-compose.test.yml run --rm -e DJANGO_SETTINGS_MODULE=config.settings.test django python manage.py migrate
  script:
    - docker compose -f docker-compose.test.yml run --rm django pytest

check_version_bump:
  stage: test
  image: debian:latest
  only:
    - merge_requests
  script:
    - apt update
    - apt install git curl -y
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - PR_VERSION=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)
    - git fetch origin main
    - git checkout origin/main -- pyproject.toml
    - MAIN_VERSION=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)

    - 'echo "PR version: $PR_VERSION"'
    - 'echo "Main version: $MAIN_VERSION"'

    - |
      # Compare versions
      if [ "$(printf '%s\n' "$MAIN_VERSION" "$PR_VERSION" | sort -V | head -n1)" != "$MAIN_VERSION" ] || [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
        echo "❌ Version must be bumped and higher than main!"
        exit 1
      fi

  allow_failure: false


build-image:
  stage: build
  image: docker:latest
  script:
    # ----------------------------
    # Login to GitLab container registry
    # ----------------------------
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY

    # ----------------------------
    # Extract version from pyproject.toml
    #   Uses pure grep (no extra tools)
    # ----------------------------
    - VERSION=$(grep -Po '(?<=version = ")[^"]+' pyproject.toml)
    - 'echo "Detected version: $VERSION"'

    # ----------------------------
    # Enable buildx
    # ----------------------------
    - docker buildx create --use --name builder
    - docker buildx inspect --bootstrap

    # ----------------------------
    # Build and push with registry cache
    # ----------------------------
    - docker buildx build \
        --push \
        --cache-from type=registry,ref=$IMAGE:buildcache \
        --cache-to   type=registry,ref=$IMAGE:buildcache,mode=max \
        --tag $IMAGE:latest \
        --tag $IMAGE:$VERSION \
        .

  only:
    - main

