workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

default:
  image:
    name: ghcr.io/astral-sh/uv:python3.13-bookworm
    pull_policy: [always, if-not-present]
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

stages:
  - lint
  - test
  - security
  - build

variables:
  # Python log flushing: immediately see logs even on crash
  PYTHONUNBUFFERED: "1"
  # Resolve git fetch issues with pipelines refs
  GIT_DEPTH: "0"
  GIT_STRATEGY: clone
  # Aligned with CONTRIBUTING.md: PostgreSQL 18
  POSTGRES_USER: 'task_dashboard'
  POSTGRES_PASSWORD: 'password'
  POSTGRES_DB: 'test_task_dashboard'
  POSTGRES_HOST_AUTH_METHOD: trust
  # Aligned with CONTRIBUTING.md: Valkey/Redis parity
  VALKEY_URL: "redis://valkey:6379/0"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  IMAGE: $CI_REGISTRY_IMAGE
  UV_CACHE_DIR: "${CI_PROJECT_DIR}/.uv-cache"
  # Optimization for Docker builds
  DOCKER_BUILDKIT: 1

cache:
  key:
    files:
      - uv.lock
  paths:
    - .uv-cache

# ---------------------------------------------------------------------------
# LINT STAGE: Tailwind v4 discovery engine scans these files
# ---------------------------------------------------------------------------
precommit:
  stage: lint
  needs: []
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
    # Skip items that have their own dedicated CI jobs for faster feedback
    SKIP: "pytest,bandit,mypy"
  cache:
    key:
      files:
        - .pre-commit-config.yaml
    paths:
      - ${PRE_COMMIT_HOME}
  script:
    - uv sync --frozen
    - uv run pre-commit run --show-diff-on-failure --color=always --all-files

mypy:
  stage: lint
  needs: []
  script:
    - uv sync --frozen
    - uv run mypy .

# ---------------------------------------------------------------------------
# TEST STAGE: Verifying GIN indexes and Identity Bridge
# ---------------------------------------------------------------------------
pytest:
  stage: test
  needs: []
  services:
    - name: postgres:18
      alias: postgres
    - name: valkey/valkey:8
      alias: valkey
  variables:
    DATABASE_URL: "postgres://task_dashboard:password@postgres:5432/test_task_dashboard"
    DJANGO_SECRET_KEY: "test-key"
    DJANGO_SETTINGS_MODULE: "config.settings.test"
    # Ensure the DB is created by the service itself if needed
    POSTGRES_DB: 'test_task_dashboard'
    POSTGRES_INITDB_ARGS: "--nosync"
  script:
    - uv sync --frozen
    # Wait for postgres to be ready
    - |
      for i in $(seq 1 30); do
        if uv run python -c "import psycopg; psycopg.connect('$DATABASE_URL')"; then
          echo "Database is ready!"
          break
        fi
        echo "Waiting for database..."
        sleep 1
      done
    - uv run pytest --junitxml=report.xml --cov=task_dashboard --cov-report=xml --cov-report=term-missing
  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - report.xml
      - coverage.xml
    expire_in: 1 week

django_check:
  stage: test
  needs: []
  variables:
    DJANGO_SETTINGS_MODULE: "config.settings.test"
    DJANGO_SECRET_KEY: "dummy-key-for-check"
    DATABASE_URL: "sqlite:///:memory:"
  script:
    - uv sync --frozen
    - uv run python manage.py makemigrations --check --dry-run
    - uv run python manage.py check --deploy

check_version_bump:
  stage: test
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - docs/**/*
        - "*.md"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - PR_VERSION=$(grep -m 1 '^version = "' pyproject.toml | cut -d '"' -f 2)
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" --depth=1
    - MAIN_VERSION=$(git show "origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME:pyproject.toml" | grep -m 1 '^version = "' | cut -d '"' -f 2)
    - 'echo "PR version: $PR_VERSION | Target version: $MAIN_VERSION"'
    - |
      if [ "$(printf '%s\n' "$MAIN_VERSION" "$PR_VERSION" | sort -V | head -n1)" != "$MAIN_VERSION" ] || [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
        echo "❌ Version must be bumped in pyproject.toml!"
        exit 1
      fi
  allow_failure: false

# ---------------------------------------------------------------------------
# SECURITY STAGE: Proactive vulnerability scanning
# ---------------------------------------------------------------------------
bandit:
  stage: security
  needs: []
  script:
    - uv sync --frozen
    - uv run bandit -r task_dashboard/ -ll

dependency_audit:
  stage: security
  needs: []
  script:
    - uv sync --frozen
    # Use temporary file instead of process substitution for /bin/sh compatibility
    - uv export --format requirements-txt > requirements.txt
    - uv run pip-audit --requirement requirements.txt --ignore-vuln GHSA-58qw-9mgm-455v

# ---------------------------------------------------------------------------
# BUILD STAGE: Multi-container stack preparation
# ---------------------------------------------------------------------------
build-image:
  stage: build
  # Final gate: require all quality/security checks to pass
  needs: ["pytest", "django_check", "mypy", "precommit", "bandit", "dependency_audit"]
  image: docker:latest
  services:
    - name: docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - VERSION=$(grep -m 1 '^version = "' pyproject.toml | cut -d '"' -f 2)
    - 'echo "Building version: $VERSION"'
    - docker buildx create --use --name builder
    - docker buildx build
      --tag $IMAGE:latest
      --tag $IMAGE:$VERSION
      --push
      --cache-from type=registry,ref=$IMAGE:buildcache
      --cache-to type=registry,ref=$IMAGE:buildcache,mode=max
      -f ./compose/production/django/Dockerfile .
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

pages:
  stage: build
  script:
    - uv sync --frozen
    - cd docs && uv run sphinx-build -b html . _build/html
  artifacts:
    paths:
      - docs/_build/html
    expire_in: 1 week
  publish: docs/_build/html
  only:
    - main
