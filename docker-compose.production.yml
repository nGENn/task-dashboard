volumes:
  production_postgres_data: {}
  production_postgres_data_backups: {}
  production_traefik: {}
  production_django_media: {}



services:
  django:
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile

    image: ticket_dashboard_production_django
    volumes:
      - production_django_media:/app/ticket_dashboard/media
    depends_on:
      - postgres
    env_file:
      - .env
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: ticket_dashboard_production_postgres
    volumes:
      - production_postgres_data:/var/lib/postgresql/18/docker
      - production_postgres_data_backups:/backups
    env_file:
      - .env

  qcluster:
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
    image: ticket_dashboard_production_django
    command: python manage.py qcluster
    env_file: .env
    depends_on:
      - postgres
    volumes:
      - production_django_media:/app/ticket_dashboard/media
