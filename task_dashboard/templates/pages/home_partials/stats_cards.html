<div id="stats-container"
     class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8"
     {% if is_htmx_oob %}hx-swap-oob="true"{% endif %}>
  <div class="stat bg-base-100 rounded-box shadow-sm border border-base-300 p-4">
    <div class="stat-figure text-primary">
      <svg xmlns="http://www.w3.org/2000/svg"
           class="h-8 w-8"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
      </svg>
    </div>
    <div class="stat-title text-xs tooltip tooltip-bottom"
         data-tip="Total tasks across all platforms">Total Tasks</div>
    <div class="stat-value text-2xl">{{ stats.total }}</div>
  </div>
  <div class="stat bg-base-100 rounded-box shadow-sm border border-base-300 p-4">
    <div class="stat-figure text-secondary">
      <svg xmlns="http://www.w3.org/2000/svg"
           class="h-8 w-8"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
    </div>
    <div class="stat-title text-xs font-bold text-secondary tooltip tooltip-bottom"
         data-tip="Tasks assigned to you">Assigned to Me</div>
    <div class="stat-value text-2xl text-secondary">{{ stats.my_tasks }}</div>
  </div>
  <div class="stat bg-base-100 rounded-box shadow-sm border border-base-300 p-4">
    <div class="stat-figure text-warning">
      <svg xmlns="http://www.w3.org/2000/svg"
           class="h-8 w-8"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    <div class="stat-title text-xs tooltip tooltip-bottom"
         data-tip="Tasks requiring immediate attention">Open</div>
    <div class="stat-value text-2xl text-warning">{{ stats.open }}</div>
  </div>
  <div class="stat bg-base-100 rounded-box shadow-sm border border-base-300 p-4">
    <div class="stat-figure text-info">
      <svg xmlns="http://www.w3.org/2000/svg"
           class="h-8 w-8"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
    </div>
    <div class="stat-title text-xs tooltip tooltip-bottom"
         data-tip="Tasks waiting on feedback">Pending</div>
    <div class="stat-value text-2xl text-info">{{ stats.pending }}</div>
  </div>
</div>
