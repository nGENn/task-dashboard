{% load i18n %}

{% if request.user.is_authenticated %}
  <div id="stats-container"
       class="hidden lg:flex items-center gap-1.5"
       {% if is_htmx_oob %}hx-swap-oob="true"{% endif %}>
    <a href="{% url 'my_tasks' %}"
       class="btn btn-ghost btn-sm h-auto min-h-0 px-3 py-1.5 bg-base-200 hover:bg-base-300 rounded-full text-xs font-semibold text-secondary normal-case tooltip tooltip-bottom border border-base-300"
       data-tip="{% trans 'Tasks assigned to you' %}">
      <span>{% trans "Assigned to Me" %}</span>
      <span class="badge badge-secondary badge-sm border-none">{{ stats.my_tasks|default:"0" }}</span>
    </a>
    <a href="{% url 'open_tasks' %}"
       class="btn btn-ghost btn-sm h-auto min-h-0 px-3 py-1.5 bg-base-200 hover:bg-base-300 rounded-full text-xs font-semibold text-warning normal-case tooltip tooltip-bottom border border-base-300"
       data-tip="{% trans 'Tasks requiring immediate attention' %}">
      <span>{% trans "Open" %}</span>
      <span class="badge badge-warning badge-sm border-none">{{ stats.open|default:"0" }}</span>
    </a>
    <a href="{% url 'unassigned_tasks' %}"
       class="btn btn-ghost btn-sm h-auto min-h-0 px-3 py-1.5 bg-base-200 hover:bg-base-300 rounded-full text-xs font-semibold text-info normal-case tooltip tooltip-bottom border border-base-300"
       data-tip="{% trans 'Tasks without an owner' %}">
      <span>{% trans "Unassigned" %}</span>
      <span class="badge badge-info badge-sm border-none">{{ stats.unassigned|default:"0" }}</span>
    </a>
  </div>
{% else %}
  <div id="stats-container"
       class="hidden"
       {% if is_htmx_oob %}hx-swap-oob="true"{% endif %}></div>
{% endif %}
