{% load i18n %}

<div id="stats-container"
     class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8"
     {% if is_htmx_oob %}hx-swap-oob="true"{% endif %}>
  <a href="/my"
     class="stat bg-base-100 rounded-box shadow-sm border border-base-300 p-4 tooltip tooltip-bottom hover:bg-base-200 transition-colors"
     data-tip="{% trans 'Tasks assigned to you' %}">
    <div class="stat-figure text-secondary">
      <svg xmlns="http://www.w3.org/2000/svg"
           class="h-8 w-8"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
    </div>
    <div class="stat-title text-xs font-bold text-secondary">{% trans "Assigned to Me" %}</div>
    <div class="stat-value text-2xl text-secondary">{{ stats.my_tasks }}</div>
  </a>
  <a href="/open"
     class="stat bg-base-100 rounded-box shadow-sm border border-base-300 p-4 tooltip tooltip-bottom hover:bg-base-200 transition-colors"
     data-tip="{% trans 'Tasks requiring immediate attention' %}">
    <div class="stat-figure text-warning">
      <svg xmlns="http://www.w3.org/2000/svg"
           class="h-8 w-8"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    <div class="stat-title text-xs">{% trans "Open" %}</div>
    <div class="stat-value text-2xl text-warning">{{ stats.open }}</div>
  </a>
  <a href="/unassigned"
     class="stat bg-base-100 rounded-box shadow-sm border border-base-300 p-4 tooltip tooltip-bottom hover:bg-base-200 transition-colors"
     data-tip="{% trans 'Tasks without an owner' %}">
    <div class="stat-figure text-info">
      <svg xmlns="http://www.w3.org/2000/svg"
           class="h-8 w-8"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
    </div>
    <div class="stat-title text-xs">{% trans "Unassigned" %}</div>
    <div class="stat-value text-2xl text-info">{{ stats.unassigned }}</div>
  </a>
</div>
