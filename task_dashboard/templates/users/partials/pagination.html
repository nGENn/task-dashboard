{% load dashboard_extras %}

<div class="flex items-center justify-center p-4 border-t border-base-300 bg-base-100">
  <div class="join">
    {% if tasks.has_previous %}
      <button hx-get="?{% url_replace page=tasks.previous_page_number %}"
              hx-target="#task-results"
              hx-swap="outerHTML"
              hx-push-url="true"
              class="join-item btn btn-sm">«</button>
    {% else %}
      <button class="join-item btn btn-sm btn-disabled">«</button>
    {% endif %}
    {% for page_num in custom_page_range %}
      {% if page_num == tasks.paginator.ELLIPSIS %}
        <button class="join-item btn btn-sm btn-disabled">...</button>
      {% elif page_num == tasks.number %}
        <button class="join-item btn btn-sm btn-active">{{ page_num }}</button>
      {% else %}
        <button hx-get="?{% url_replace page=page_num %}"
                hx-target="#task-results"
                hx-swap="outerHTML"
                hx-push-url="true"
                class="join-item btn btn-sm bg-base-100">{{ page_num }}</button>
      {% endif %}
    {% endfor %}
    {% if tasks.has_next %}
      <button hx-get="?{% url_replace page=tasks.next_page_number %}"
              hx-target="#task-results"
              hx-swap="outerHTML"
              hx-push-url="true"
              class="join-item btn btn-sm">»</button>
    {% else %}
      <button class="join-item btn btn-sm btn-disabled">»</button>
    {% endif %}
  </div>
</div>
