version: '3.8'

x-openproject-restart-policy: &openproject-restart-policy
  restart: unless-stopped
x-openproject-image: &openproject-image
  image: openproject/openproject:15-slim
x-openproject-app: &openproject-app
  <<: [*openproject-image, *openproject-restart-policy]
  environment:
    OPENPROJECT_HTTPS: "false"
    OPENPROJECT_HOST__NAME: "localhost:8083"
    OPENPROJECT_HSTS: "true"
    RAILS_CACHE_STORE: "memcache"
    OPENPROJECT_CACHE__MEMCACHE__SERVER: "openproject-cache:11211"
    OPENPROJECT_RAILS__RELATIVE__URL__ROOT: ""
    DATABASE_URL: "postgres://postgres:p4ssw0rd@openproject-db/openproject?pool=20&encoding=unicode&reconnect=true"
    RAILS_MIN_THREADS: 4
    RAILS_MAX_THREADS: 16
    IMAP_ENABLED: "false"
  volumes:
    - "openproject-opdata:/var/openproject/assets"

x-shared:
  zammad-service: &zammad-service
    environment: &zammad-environment
      MEMCACHE_SERVERS: ${MEMCACHE_SERVERS:-zammad-memcached:11211}
      POSTGRESQL_DB: ${POSTGRES_DB:-zammad_production}
      POSTGRESQL_HOST: ${POSTGRES_HOST:-zammad-postgresql}
      POSTGRESQL_USER: ${POSTGRES_USER:-zammad}
      POSTGRESQL_PASS: ${POSTGRES_PASS:-zammad}
      POSTGRESQL_PORT: ${POSTGRES_PORT:-5432}
      POSTGRESQL_OPTIONS: ${POSTGRESQL_OPTIONS:-?pool=50}
      POSTGRESQL_DB_CREATE:
      REDIS_URL: ${REDIS_URL:-redis://zammad-redis:6379}
      S3_URL:
      # Backup settings
      BACKUP_DIR: "${BACKUP_DIR:-/var/tmp/zammad}"
      BACKUP_TIME: "${BACKUP_TIME:-03:00}"
      HOLD_DAYS: "${HOLD_DAYS:-10}"
      TZ: "${TZ:-Europe/Berlin}"
      # Allow passing in these variables via .env:
      AUTOWIZARD_JSON:
      AUTOWIZARD_RELATIVE_PATH:
      ELASTICSEARCH_ENABLED: 'yes'
      ELASTICSEARCH_SCHEMA:
      ELASTICSEARCH_HOST: 'zammad-elasticsearch'
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_USER: ${ELASTICSEARCH_USER:-elastic}
      ELASTICSEARCH_PASS: ${ELASTICSEARCH_PASS:-zammad}
      ELASTICSEARCH_NAMESPACE:
      ELASTICSEARCH_REINDEX:
      NGINX_PORT: '8080'
      NGINX_CLIENT_MAX_BODY_SIZE:
      NGINX_SERVER_NAME: 'localhost'
      NGINX_SERVER_SCHEME:
      RAILS_TRUSTED_PROXIES:
      ZAMMAD_HTTP_TYPE: 'http'
      ZAMMAD_FQDN: 'localhost'
      ZAMMAD_WEB_CONCURRENCY:
      ZAMMAD_PROCESS_SESSIONS_JOBS_WORKERS:
      ZAMMAD_PROCESS_SCHEDULED_JOBS_WORKERS:
      ZAMMAD_PROCESS_DELAYED_JOBS_WORKERS:
      # ZAMMAD_SESSION_JOBS_CONCURRENT is deprecated, please use ZAMMAD_PROCESS_SESSIONS_JOBS_WORKERS instead.
      ZAMMAD_SESSION_JOBS_CONCURRENT:
      # Variables used by ngingx-proxy container for reverse proxy creations
      # for docs refer to https://github.com/nginx-proxy/nginx-proxy
      VIRTUAL_HOST:
      VIRTUAL_PORT:
      # Variables used by acme-companion for retrieval of LetsEncrypt certificate
      # for docs refer to https://github.com/nginx-proxy/acme-companion
      LETSENCRYPT_HOST:
      LETSENCRYPT_EMAIL:

    image: ${IMAGE_REPO:-ghcr.io/zammad/zammad}:${VERSION:-6.5.0-101}
    restart: ${RESTART:-always}
    volumes:
      - zammad-storage:/opt/zammad/storage
    depends_on:
      - zammad-memcached
      - zammad-postgresql
      - zammad-redis

networks:
  ticket-dashboard-net:
    driver: bridge

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    networks:
      - ticket-dashboard-net
    depends_on:
      - db
      - espocrm-db
      - zammad-nginx
      - openproject-proxy
      - eramba-app

  db:
    image: postgres:latest
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - ticket-dashboard-net

  espocrm-db:
    image: mariadb:latest
    container_name: espocrm-db
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: espocrm
      MARIADB_USER: espocrm
      MARIADB_PASSWORD: database_password
    volumes:
      - espocrm-db:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 20s
      start_period: 10s
      timeout: 10s
      retries: 3
    networks:
      - ticket-dashboard-net

  espocrm:
    image: espocrm/espocrm
    container_name: espocrm
    environment:
      ESPOCRM_DATABASE_PLATFORM: Mysql
      ESPOCRM_DATABASE_HOST: espocrm-db
      ESPOCRM_DATABASE_USER: espocrm
      ESPOCRM_DATABASE_PASSWORD: database_password
      ESPOCRM_ADMIN_USERNAME: admin
      ESPOCRM_ADMIN_PASSWORD: password
      ESPOCRM_SITE_URL: "http://localhost:8080"
    volumes:
      - espocrm:/var/www/html
    restart: always
    depends_on:
      espocrm-db:
        condition: service_healthy
    ports:
      - 8080:80
    networks:
      - ticket-dashboard-net

  espocrm-daemon:
    image: espocrm/espocrm
    container_name: espocrm-daemon
    volumes:
      - espocrm:/var/www/html
    restart: always
    entrypoint: docker-daemon.sh
    networks:
      - ticket-dashboard-net

  espocrm-websocket:
    image: espocrm/espocrm
    container_name: espocrm-websocket
    environment:
      ESPOCRM_CONFIG_USE_WEB_SOCKET: "true"
      ESPOCRM_CONFIG_WEB_SOCKET_URL: "ws://localhost:8081"
      ESPOCRM_CONFIG_WEB_SOCKET_ZERO_M_Q_SUBSCRIBER_DSN: "tcp://*:7777"
      ESPOCRM_CONFIG_WEB_SOCKET_ZERO_M_Q_SUBMISSION_DSN: "tcp://espocrm-websocket:7777"
    volumes:
      - espocrm:/var/www/html
    restart: always
    entrypoint: docker-websocket.sh
    ports:
      - 8081:8080
    networks:
      - ticket-dashboard-net

  zammad-backup:
    <<: *zammad-service
    command: ["zammad-backup"]
    volumes:
      - zammad-backup:/var/tmp/zammad
      - zammad-storage:/opt/zammad/storage:ro
    user: 0:0
    networks:
      - ticket-dashboard-net

  zammad-elasticsearch:
    image: bitnami/elasticsearch:${ELASTICSEARCH_VERSION:-8.18.0}
    restart: ${RESTART:-always}
    volumes:
      - elasticsearch-data:/bitnami/elasticsearch/data
    environment:
      # See https://github.com/bitnami/containers/tree/main/bitnami/elasticsearch#environment-variables
      #
      # Enable authorization without HTTPS. For external access with
      #   SSL termination, use solutions like nginx-proxy-manager.
      ELASTICSEARCH_ENABLE_SECURITY: 'true'
      ELASTICSEARCH_SKIP_TRANSPORT_TLS: 'true'
      ELASTICSEARCH_ENABLE_REST_TLS: 'false'
      # ELASTICSEARCH_USER is hardcoded to 'elastic' in the container.
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASS:-zammad}
      # Resource settings
      ELASTICSEARCH_HEAP_SIZE:
      ELASTICSEARCH_MAX_ALLOWED_MEMORY_PERCENTAGE:
      ELASTICSEARCH_MAX_ALLOWED_MEMORY:
      ELASTICSEARCH_MAX_TIMEOUT:
      ELASTICSEARCH_LOCK_ALL_MEMORY:
    networks:
      - ticket-dashboard-net

  zammad-init:
    <<: *zammad-service
    command: ["zammad-init"]
    depends_on:
      - zammad-postgresql
    restart: on-failure
    user: 0:0
    networks:
      - ticket-dashboard-net

  zammad-memcached:
    command: memcached -m 256M
    image: memcached:${MEMCACHE_VERSION:-1.6.38-alpine}
    restart: ${RESTART:-always}
    networks:
      - ticket-dashboard-net

  zammad-nginx:
    <<: *zammad-service
    command: ["zammad-nginx"]
    ports:
      - "8082:8080"
    depends_on:
      - zammad-railsserver
    networks:
      - ticket-dashboard-net

  zammad-postgresql:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zammad_production}
      POSTGRES_USER: ${POSTGRES_USER:-zammad}
      POSTGRES_PASSWORD: ${POSTGRES_PASS:-zammad}
    image: postgres:${POSTGRES_VERSION:-17.5-alpine}
    restart: ${RESTART:-always}
    volumes:
      - zammad-postgresql-data:/var/lib/postgresql/data
    networks:
      - ticket-dashboard-net

  zammad-railsserver:
    <<: *zammad-service
    command: ["zammad-railsserver"]
    networks:
      - ticket-dashboard-net

  zammad-redis:
    image: redis:${REDIS_VERSION:-7.4.4-alpine}
    restart: ${RESTART:-always}
    volumes:
      - redis-data:/data
    networks:
      - ticket-dashboard-net

  zammad-scheduler:
    <<: *zammad-service
    command: ["zammad-scheduler"]
    networks:
      - ticket-dashboard-net

  zammad-websocket:
    <<: *zammad-service
    command: ["zammad-websocket"]
    networks:
      - ticket-dashboard-net

  eramba-mysql:
    container_name: eramba-mysql
    image: mysql:8.0.28-oracle
    command: ["mysqld", "--disable-log-bin"]
    restart: always
    volumes:
      - eramba-db-data:/var/lib/mysql
      - ../extra-services/eramba/mysql/conf.d:/etc/mysql/conf.d
      - ../extra-services/eramba/mysql/entrypoint:/docker-entrypoint-initdb.d
    environment:
      MYSQL_DATABASE: docker
      MYSQL_USER: docker
      MYSQL_PASSWORD: Your_DB_user_P@ssw0rd
      MYSQL_ROOT_PASSWORD: Your_MysQl_ROOt_P@ssw0rd
    networks:
      - ticket-dashboard-net

  eramba-redis:
    container_name: eramba-redis
    image: redis:6.0.16-alpine
    restart: always
    networks:
      - ticket-dashboard-net

  eramba-app:
    container_name: eramba-app
    image: ghcr.io/eramba/eramba:latest
    restart: always
    ports:
      - "8084:80"
    volumes:
      - eramba-data:/var/www/eramba/app/upgrade/data
      - eramba-app:/var/www/eramba
      - eramba-logs:/var/www/eramba/app/upgrade/logs
      - ../extra-services/eramba/apache/security.conf:/etc/apache2/conf-available/security.conf
      - ../extra-services/eramba/apache/ports.conf:/etc/apache2/ports.conf
      - ../extra-services/eramba/apache/vhost.conf:/etc/apache2/sites-available/000-default.conf
      - ../extra-services/eramba/crontab/crontab:/etc/cron.d/eramba-crontab
    environment:
      DB_HOST: eramba-mysql
      DB_DATABASE: docker
      DB_USERNAME: docker
      DB_PASSWORD: Your_DB_user_P@ssw0rd
      CACHE_URL: Redis://?server=eramba-redis&port=6379&password=&timeout=3
      USE_PROXY: 0
      PROXY_HOST:
      PROXY_PORT:
      USE_PROXY_AUTH: 0
      PROXY_AUTH_USER:
      PROXY_AUTH_PASS:
      PUBLIC_ADDRESS: http://localhost:8084
      DOCKER_DEPLOYMENT: 1
      LDAPTLS_REQCERT: never
    depends_on:
      - eramba-mysql
      - eramba-redis
    networks:
      - ticket-dashboard-net

  eramba-cron:
    container_name: eramba-cron
    image: ghcr.io/eramba/eramba:latest
    command: ["cron", "-f"]
    entrypoint: ["/docker-cron-entrypoint.sh"]
    restart: always
    volumes:
      - eramba-data:/var/www/eramba/app/upgrade/data
      - eramba-app:/var/www/eramba
      - eramba-logs:/var/www/eramba/app/upgrade/logs
      - ../extra-services/eramba/docker-cron-entrypoint.sh:/docker-cron-entrypoint.sh
      - ../extra-services/eramba/crontab/crontab:/etc/cron.d/eramba-crontab
      - ../extra-services/eramba/.env:/var/www/docker.env
    environment:
      DB_HOST: eramba-mysql
      DB_DATABASE: docker
      DB_USERNAME: docker
      DB_PASSWORD: Your_DB_user_P@ssw0rd
      CACHE_URL: Redis://?server=eramba-redis&port=6379&password=&timeout=3
      USE_PROXY: 0
      PROXY_HOST:
      PROXY_PORT:
      USE_PROXY_AUTH: 0
      PROXY_AUTH_USER:
      PROXY_AUTH_PASS:
      PUBLIC_ADDRESS: https://localhost:8084
      DOCKER_DEPLOYMENT: 1
      LDAPTLS_REQCERT: never
    depends_on:
      - eramba-app
    networks:
      - ticket-dashboard-net

  openproject-db:
    image: postgres:13
    <<: *openproject-restart-policy
    stop_grace_period: "3s"
    volumes:
      - "openproject-pgdata:/var/lib/postgresql/data"
    environment:
      POSTGRES_PASSWORD: p4ssw0rd
      POSTGRES_DB: openproject
    networks:
      - ticket-dashboard-net

  openproject-cache:
    image: memcached
    <<: *openproject-restart-policy
    networks:
      - ticket-dashboard-net

  openproject-proxy:
    build:
      context: ../extra-services/openproject/proxy
      args:
        APP_HOST: openproject-web
    image: openproject/proxy
    <<: *openproject-restart-policy
    ports:
      - "8083:80"
    depends_on:
      - openproject-web
    networks:
      - ticket-dashboard-net

  openproject-web:
    <<: *openproject-app
    command: "./docker/prod/web"
    networks:
      - ticket-dashboard-net
    depends_on:
      - openproject-db
      - openproject-cache
      - openproject-seeder
    labels:
      - autoheal=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health_checks/default"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  openproject-autoheal:
    image: willfarrell/autoheal:1.2.0
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_START_PERIOD: 600
      AUTOHEAL_INTERVAL: 30
    networks:
      - ticket-dashboard-net

  openproject-worker:
    <<: *openproject-app
    command: "./docker/prod/worker"
    networks:
      - ticket-dashboard-net
    depends_on:
      - openproject-db
      - openproject-cache
      - openproject-seeder

  openproject-cron:
    <<: *openproject-app
    command: "./docker/prod/cron"
    networks:
      - ticket-dashboard-net
    depends_on:
      - openproject-db
      - openproject-cache
      - openproject-seeder

  openproject-seeder:
    <<: *openproject-app
    command: "./docker/prod/seeder"
    restart: on-failure
    networks:
      - ticket-dashboard-net
    depends_on:
      - openproject-db
      - openproject-cache

volumes:
  postgres-data:
  espocrm-db:
  espocrm:
  eramba-app:
  eramba-data:
  eramba-logs:
  eramba-db-data:
  elasticsearch-data:
    driver: local
  zammad-postgresql-data:
    driver: local
  redis-data:
    driver: local
  zammad-backup:
    driver: local
  zammad-storage:
    driver: local
  openproject-pgdata:
    driver: local
  openproject-opdata:
    driver: local
